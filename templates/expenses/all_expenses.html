{% extends 'base.html' %}

{% block content %}
<div class="pt-3">
    <div class="card shadow">
        <div class="card-header">
            <h3 class="card-title">All Transcations</h3>
            <div class="card-tools">
                <form method="GET" action={% url 'all_expenses' %} class="input-group input-group-sm" style="width: 250px;">
                <input type="text" name="search" class="form-control float-right" placeholder="Search by title..." value="{{  query|default:'' }}">
                <div class="input-group-append">
                    <button type="submit" class="btn btn-default"><i class="fas fa-search"></i></button>
                </div>
            </form>
        </div>
    </div>
    <div class="card-body table-responsive p-0">
        <table class="table table-hover text-nowrap">
        <thead>
                    <tr>
                        <th>Date</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td>{{ expense.date }}</td>
                        <td>{{ expense.title }}</td>
                        <td><span class="badge badge-primary">{{ expense.category.name }}</span></td>
                        <td class="text-bold">${{ expense.amount }}</td>
                        <td>
                            <a href="{% url 'edit_expense' expense.pk %}" class="btn btn-xs btn-info"><i class="fas fa-edit"></i></a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="5" class="text-center">No results found.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
